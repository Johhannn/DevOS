version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: devos-postgres
    environment:
      POSTGRES_USER: devos
      POSTGRES_PASSWORD: devos_password
      POSTGRES_DB: devos_db
    ports:
      - "5432:5432"
    volumes:
      - devos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devos -d devos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: devos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devos_pgdata:
